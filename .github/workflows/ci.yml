name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python – lint & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tools
        run: pip install -r requirements-dev.txt

      - name: Ruff – lint
        run: ruff check src/

      - name: Ruff – format check
        run: ruff format --check src/

      - name: Bandit – security scan
        run: bandit -r src/ -c pyproject.toml

      - name: pip-audit – dependency vulnerabilities
        # Reports known CVEs in requirements.txt; continue-on-error so a
        # transitive vuln in torch/ultralytics doesn't block all PRs.
        # Remove continue-on-error once all findings are triaged or suppressed.
        run: pip-audit -r requirements.txt
        continue-on-error: true

  js:
    name: JavaScript – lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint
